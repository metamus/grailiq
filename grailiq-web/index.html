<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B18" />

    <title>GrailIQ · Know what your sealed Pokémon is actually worth</title>
    <meta name="description" content="Real-time price tracking, Buy/Hold/Watch/Avoid signals, and portfolio analytics for every sealed Pokémon TCG product. The Bloomberg Terminal for sealed Pokémon." />
    <meta name="keywords" content="Pokemon TCG, sealed products, investment, GrailIQ Score, booster box prices, Elite Trainer Box, price tracker, restock alerts" />
    <link rel="canonical" href="https://grailiq.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GrailIQ" />
    <meta property="og:title" content="GrailIQ · Price intelligence for sealed Pokémon TCG" />
    <meta property="og:description" content="Real-time prices, proprietary 0–100 GrailIQ Score, and portfolio analytics for every sealed Pokémon TCG product. Stop guessing. Start knowing." />
    <meta property="og:url" content="https://grailiq.com/" />
    <meta property="og:image" content="https://grailiq.com/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GrailIQ · Price intelligence for sealed Pokémon TCG" />
    <meta name="twitter:description" content="Real-time prices, proprietary 0–100 GrailIQ Score, and portfolio analytics for every sealed Pokémon TCG product." />
    <meta name="twitter:image" content="https://grailiq.com/og-image.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

    <!-- JSON-LD for Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "GrailIQ",
        "url": "https://grailiq.com",
        "logo": "https://grailiq.com/logo.svg",
        "description": "Price intelligence, investment signals, and portfolio analytics for sealed Pokémon TCG products.",
        "sameAs": [
          "https://twitter.com/grailiq",
          "https://instagram.com/grailiq"
        ],
        "contact": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "email": "hello@grailiq.com"
        }
      }
    </script>

    <!-- JSON-LD for WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GrailIQ",
        "url": "https://grailiq.com",
        "description": "Know what your sealed Pokémon is actually worth. Real-time price tracking, Buy/Hold/Watch/Avoid signals, and portfolio analytics for every sealed Pokémon TCG product.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://grailiq.com/score?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- JSON-LD for SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "GrailIQ",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": [
          {
            "@type": "Offer",
            "priceCurrency": "USD",
            "price": "0",
            "name": "Free Tier"
          },
          {
            "@type": "Offer",
            "priceCurrency": "USD",
            "price": "14",
            "name": "Collector Tier",
            "pricingPattern": "https://schema.org/BillingPeriod#Monthly"
          },
          {
            "@type": "Offer",
            "priceCurrency": "USD",
            "price": "39",
            "name": "Investor Tier",
            "pricingPattern": "https://schema.org/BillingPeriod#Monthly"
          }
        ],
        "description": "Price intelligence, investment signals, and portfolio analytics for sealed Pokémon TCG products. The Bloomberg Terminal for collectors."
      }
    </script>
  </head>
  <body class="bg-grailiq-ink text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
