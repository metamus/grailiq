version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: grailiq-postgres
    environment:
      POSTGRES_USER: grailiq
      POSTGRES_PASSWORD: grailiq_dev
      POSTGRES_DB: grailiq
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grailiq']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grailiq-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
